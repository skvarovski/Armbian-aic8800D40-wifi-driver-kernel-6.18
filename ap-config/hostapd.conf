# AIC8800D40 5 GHz 802.11ac WPA2 AP — example defaults (override via INSTALL.sh env)
interface=wlan0
driver=nl80211
ssid=AIC8800D40-AP
hw_mode=a
channel=36
ieee80211n=1
ieee80211ac=1
wmm_enabled=1
ht_capab=[HT40+][SHORT-GI-20][SHORT-GI-40]
wpa=2
wpa_passphrase=ChangeMe12345
wpa_key_mgmt=WPA-PSK
rsn_pairwise=CCMP
ignore_broadcast_ssid=0
