# AIC8800D40 5 GHz 802.11ac WPA2 AP — example defaults (override via INSTALL.sh env)
interface=wlan0
driver=nl80211
ssid=AIC8800D40-AP
hw_mode=a
channel=36
ieee80211n=1
ieee80211ac=1
wmm_enabled=1
# HT20 (not HT40). On AIC8800, hostapd's HT40 coexistence scan (HT_SCAN) frequently
# fails with "Interface initialization failed" → AP never reaches ENABLED. HT20+AC is
# stable. (upstream hostapd has no `noscan` option — it exists only in OpenWrt patches.)
# If you want to try HT40 for more throughput, set ht_capab=[HT40+][SHORT-GI-20][SHORT-GI-40]
# and watch `journalctl -u hostapd` for "HT_SCAN->DISABLED"; revert to HT20 if it loops.
ht_capab=[SHORT-GI-20]
wpa=2
wpa_passphrase=ChangeMe12345
wpa_key_mgmt=WPA-PSK
rsn_pairwise=CCMP
ignore_broadcast_ssid=0
