# DHCP + DNS for the AP subnet — example 192.168.43.0/24 (override via INSTALL.sh AP_IP)
interface=wlan0
bind-interfaces

# --- DNS ----------------------------------------------------------
# Do NOT read /etc/resolv.conf (it may point at systemd-resolved / be empty).
# Forward DNS queries to public resolvers directly.
no-resolv
server=1.1.1.1
server=8.8.8.8
# If your LAN/upstream has its own resolver, add it here (lower latency), e.g.:
# server=192.168.1.1

# --- DHCP ---------------------------------------------------------
dhcp-range=192.168.43.10,192.168.43.50,12h
dhcp-option=option:router,192.168.43.1
dhcp-option=option:dns-server,192.168.43.1
