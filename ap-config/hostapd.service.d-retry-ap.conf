# Drop-in override for hostapd.service
# Copy to: /etc/systemd/system/hostapd.service.d/retry-ap.conf
# then: systemctl daemon-reload && systemctl restart hostapd
#
# Why this exists:
#   - Debian's default hostapd unit is Type=forking + hostapd -B, which exits 0
#     even when the AP fails to come up — so Restart=on-failure never fires.
#   - We switch to Type=simple (no -B) so a real AP failure is seen as a crash
#     and systemd restarts it.
#   - The wlan0 IP is set in ExecStartPost (AFTER the AP is up) to avoid racing
#     with the AIC8800 driver creating wlan0 — setting it only at boot can lose
#     against driver probe timing, leaving dnsmasq with "no address on wlan0".
#   - NAT is set up in the same ExecStartPost so AP clients get internet.
#
# INSTALL.sh substitutes __AP_IP__ with the configured AP IP (default 192.168.43.1).
[Service]
Type=simple
PIDFile=
ExecStart=
ExecStart=/usr/sbin/hostapd /etc/hostapd/hostapd.conf
ExecStartPost=/sbin/ip addr replace __AP_IP__/24 dev wlan0
ExecStartPost=/usr/local/sbin/sbc-ap-nat.sh
Restart=always
RestartSec=5

[Unit]
StartLimitIntervalSec=600
StartLimitBurst=20
